<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="720" viewBox="0 0 1800 720" role="img" aria-labelledby="title desc">
  <title id="title">Banner de Misión Admisión OS</title>
  <desc id="desc">Banner espacial vectorial de Misión Admisión OS</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#020b3b"/>
      <stop offset="55%" stop-color="#04245f"/>
      <stop offset="100%" stop-color="#1898b6"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a43ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8a43ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7efcff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7efcff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="osGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64f1ff"/>
      <stop offset="100%" stop-color="#9c62ff"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 78px Arial, Helvetica, sans-serif; letter-spacing: 2px; fill: #f2f6ff; }
      .os { fill: url(#osGrad); }
      .sub1 { font: 700 22px Arial, Helvetica, sans-serif; letter-spacing: 12px; fill: #71f7ff; }
      .sub2 { font: 700 18px Arial, Helvetica, sans-serif; letter-spacing: 10px; fill: #d9e7ff; }
      .sectionTitle { font: 700 15px Arial, Helvetica, sans-serif; letter-spacing: 2px; fill: #f0f5ff; }
      .sectionText { font: 400 14px Arial, Helvetica, sans-serif; fill: #d2dcf5; }
      .tagline { font: 700 18px Arial, Helvetica, sans-serif; letter-spacing: 10px; fill: #72f6ff; }
      .linePurple { stroke: #8e4bff; stroke-width: 2.2; fill: none; opacity: .9; }
      .lineWhite { stroke: #d7e3ff; stroke-width: 1.6; fill: none; opacity: .58; }
      .orbit { fill: none; stroke: #d7e3ff; stroke-width: 3; opacity: .9; }
      .orbit2 { fill: none; stroke: #8e4bff; stroke-width: 3; opacity: .88; }
      .thinOrbit { fill: none; stroke: #9cecff; stroke-width: 2; opacity: .26; }
      .divider { stroke: #4d5c88; stroke-width: 1.4; opacity: .7; }
      .icon { stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1800" height="720" rx="28" fill="url(#bg)"/>
  <rect width="1800" height="720" rx="28" fill="url(#purpleGlow)" opacity="0.18"/>

  <g opacity="0.95">
    <path class="lineWhite" d="M-80 660 C 140 540, 140 250, 330 120"/>
    <path class="linePurple" d="M-50 690 C 180 560, 165 270, 365 140"/>
    <path class="lineWhite" d="M-10 708 C 210 585, 210 315, 398 172"/>
    <path class="linePurple" d="M40 720 C 255 600, 250 355, 425 205"/>
    <path class="lineWhite" d="M95 720 C 300 615, 300 390, 455 235"/>
    <path class="linePurple" d="M150 720 C 340 620, 350 420, 490 265"/>
    <path class="lineWhite" d="M210 720 C 395 625, 405 445, 520 295"/>
    <circle cx="112" cy="642" r="17" fill="#8e4bff" opacity="0.95" filter="url(#softGlow)"/>
    <circle cx="235" cy="105" r="6" fill="#9f67ff"/>
    <circle cx="340" cy="215" r="5" fill="#d7e3ff" opacity="0.8"/>
  </g>

  <g opacity="0.9">
    <ellipse class="orbit" cx="1380" cy="172" rx="134" ry="84" transform="rotate(-28 1380 172)"/>
    <ellipse class="orbit2" cx="1380" cy="172" rx="134" ry="84" transform="rotate(-28 1380 172) translate(-10 8)" opacity="0.65"/>
    <circle cx="1290" cy="141" r="9" fill="#f3f7ff"/>
    <circle cx="1346" cy="108" r="7" fill="#9162ff"/>
    <circle cx="1436" cy="223" r="10" fill="#74efff" filter="url(#softGlow)"/>
    <path class="thinOrbit" d="M1575 75 C 1710 118, 1770 260, 1728 405"/>
    <path class="thinOrbit" d="M1680 30 C 1788 128, 1830 262, 1802 468"/>
    <circle cx="1715" cy="126" r="16" fill="#72f6ff" opacity="0.75"/>
    <circle cx="1768" cy="202" r="6" fill="#d8e5ff" opacity="0.8"/>
    <circle cx="1666" cy="482" r="7" fill="#8e4bff" opacity="0.95"/>
    <circle cx="1733" cy="575" r="5" fill="#d8e5ff" opacity="0.9"/>
  </g>

  <g transform="translate(520 198)">
    <text class="title" x="0" y="0">MISIÓN ADMISIÓN</text>
    <text class="title os" x="866" y="0">OS</text>
    <text class="sub1" x="162" y="62">EL SISTEMA OPERATIVO</text>
    <text class="sub2" x="182" y="97">DE MISIÓN ADMISIÓN</text>
    <line x1="210" y1="148" x2="806" y2="148" stroke="#324a82" stroke-width="2" opacity="0.55"/>
    <line x1="455" y1="148" x2="535" y2="148" stroke="#8e4bff" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g transform="translate(520 436)">
    <line class="divider" x1="260" y1="18" x2="260" y2="158"/>
    <line class="divider" x1="620" y1="18" x2="620" y2="158"/>
    <line class="divider" x1="980" y1="18" x2="980" y2="158"/>

    <g transform="translate(0 0)">
      <g class="icon" stroke="#8e4bff">
        <path d="M16 96 H110" opacity="0"/>
        <path d="M28 84 V120"/>
        <path d="M56 72 V120"/>
        <path d="M84 54 V120"/>
        <path d="M24 120 H92"/>
        <path d="M84 54 L103 35"/>
        <path d="M88 34 H106 V52"/>
      </g>
      <text class="sectionTitle" x="8" y="168">COMERCIAL</text>
      <text class="sectionText" x="-10" y="202">Herramientas para</text>
      <text class="sectionText" x="-16" y="224">impulsar resultados</text>
    </g>

    <g transform="translate(360 0)">
      <g class="icon" stroke="#72f6ff">
        <circle cx="56" cy="88" r="24"/>
        <path d="M56 48 V58 M56 118 V128 M16 88 H26 M86 88 H96"/>
        <path d="M29 61 L36 68 M76 108 L83 115 M29 115 L36 108 M76 68 L83 61"/>
      </g>
      <text class="sectionTitle" x="-10" y="168">OPERACIONES</text>
      <text class="sectionText" x="-6" y="202">Procesos que</text>
      <text class="sectionText" x="-28" y="224">mantienen todo en orden</text>
    </g>

    <g transform="translate(720 0)">
      <g class="icon" stroke="#8e4bff">
        <path d="M26 112 L86 52"/>
        <path d="M58 54 L90 22 L116 48 L84 80 Z"/>
        <path d="M48 122 L72 98"/>
        <path d="M34 136 L50 120"/>
      </g>
      <text class="sectionTitle" x="-54" y="168">IDENTIDAD Y CRECIMIENTO</text>
      <text class="sectionText" x="-18" y="202">Fortalecemos la marca</text>
      <text class="sectionText" x="-18" y="224">y potenciamos el impacto</text>
    </g>

    <g transform="translate(1080 0)">
      <g class="icon" stroke="#72f6ff">
        <path d="M16 60 H58 L72 76 H112 V128 H16 Z"/>
        <path d="M16 76 H112"/>
      </g>
      <text class="sectionTitle" x="18" y="168">GENERAL</text>
      <text class="sectionText" x="-18" y="202">Recursos y documentos</text>
      <text class="sectionText" x="6" y="224">para el día a día</text>
    </g>
  </g>

  <g transform="translate(620 610)">
    <rect x="0" y="0" width="560" height="58" rx="28" fill="rgba(5,18,56,0.18)" stroke="#6a5fd2" stroke-width="2"/>
    <text class="tagline" x="86" y="37">ORGANIZA • EJECUTA • ESCALA</text>
  </g>
</svg>